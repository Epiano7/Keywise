name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: "9.0.x"

      - name: Publish portable Windows build
        run: dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true -o artifacts/Keywise-win-x64

      - name: Zip portable build
        shell: pwsh
        run: Compress-Archive -Path artifacts/Keywise-win-x64/* -DestinationPath artifacts/Keywise-win-x64.zip -Force

      - name: Install Inno Setup
        run: choco install innosetup --version=6.7.1 --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\Keywise.iss /DAppVersion=$version

      - name: Generate checksums
        shell: pwsh
        run: |
          $assets = @(
            Get-ChildItem artifacts/installer/Keywise-Setup-*.exe
            Get-Item artifacts/Keywise-win-x64.zip
          )
          $assets | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "$($hash.Hash.ToLowerInvariant())  $($_.Name)"
          } | Set-Content artifacts/checksums.txt -Encoding ascii

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: |
            artifacts/installer/Keywise-Setup-*.exe
            artifacts/Keywise-win-x64.zip
            artifacts/checksums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: Keywise-release-assets
          path: |
            artifacts/installer/Keywise-Setup-*.exe
            artifacts/Keywise-win-x64.zip
            artifacts/checksums.txt
